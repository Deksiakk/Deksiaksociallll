<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deksiak - Linki</title>
    <style>
        /* 1. KONTENER NA RUCHOMY TELEDYSK W TLE */
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
            background-color: #0a0514;
        }

        #video-background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
        }

        /* Przyciemnienie wideo, żeby przyciski i neony były mega widoczne */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 5, 20, 0.6);
            z-index: -1;
        }

        body {
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }

        .glass-panel {
            background: rgba(15, 10, 30, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 24px;
            max-width: 440px;
            margin: 0 auto;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            box-sizing: border-box;
        }

        /* 2. NEONOWE NAPISY */
        h1 {
            color: #ffffff;
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: 2px;
            /* Fioletowo-niebieski neon dla nicku Deksiak */
            text-shadow: 0 0 10px #8a2be2, 0 0 20px #00bfff, 0 0 30px #00bfff;
        }

        p {
            color: #00eaff;
            font-size: 1.4rem;
            margin-bottom: 40px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            /* Mocny niebieski neon dla Moje Sociale! */
            text-shadow: 0 0 5px #00eaff, 0 0 10px #00eaff, 0 0 25px #00bfff;
        }

        /* 3. TRZY PRZYCISKI */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.02);
        }

        /* Przycisk YouTube */
        .btn-yt {
            background: linear-gradient(135deg, #ff003c, #b30022);
            border: 1px solid rgba(255, 0, 60, 0.4);
            box-shadow: 0 6px 20px rgba(255, 0, 60, 0.3);
        }
        .btn-yt:hover {
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.8);
        }

        /* Przycisk Discord */
        .btn-dc {
            background: linear-gradient(135deg, #5865F2, #3b45c2);
            border: 1px solid rgba(88, 101, 242, 0.4);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.3);
        }
        .btn-dc:hover {
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.8);
        }

        /* Przycisk Spotify */
        .btn-sp {
            background: linear-gradient(135deg, #1DB954, #1aa34a);
            border: 1px solid rgba(29, 185, 84, 0.4);
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.3);
        }
        .btn-sp:hover {
            box-shadow: 0 0 30px rgba(29, 185, 84, 0.8);
        }
    </style>
</head>
<body>

    <!-- Ruchome wideo w tle -->
    <div id="video-container">
        <video autoplay muted loop playsinline id="video-background">
            <source src="teledysk.mp4" type="video/mp4">
        </video>
    </div>

    <div class="overlay"></div>

    <!-- Główny panel ze szklanym efektem -->
    <div class="glass-panel">
        <h1>Deksiak</h1>
        <p>Moje Sociale!</p>

        <div class="links-container">
            <a href="https://www.youtube.com/@deksiak2" target="_blank" class="btn btn-yt">KANAŁ YOUTUBE</a>
            <a href="https://discord.gg/6xx76a3Xwh" target="_blank" class="btn btn-dc">SERWER DISCORD</a>
            <!-- Tutaj wklej swój link do Spotify zamiast # jeśli chcesz -->
            <a href="#" target="_blank" class="btn btn-sp">SPOTIFY</a>
        </div>
    </div>

</body>
</html>
